<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <!-- 引用 Google Font 字体（可选） -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 背景：使用渐变色，从上到下由浅蓝渐变到浅紫 */
            background: linear-gradient(135deg, #e0e7ff, #f0e6ff);
            /* 字体：优先使用 Inter（Google 字体），如果加载失败则使用系统字体 */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            /* 让内容在屏幕中垂直居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            /* 设置最小高度为整个视口高度，确保居中 */
            min-height: 100vh;
            /* 内边距，让内容不贴边 */
            padding: 20px;
        }

        /* 主卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.7);   /* 半透明白色背景 */
            backdrop-filter: blur(10px);            /* 毛玻璃效果 */
            border-radius: 24px;                    /* 圆角 */
            padding: 48px 56px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); /* 柔和阴影 */
            text-align: center;                     /* 内容居中 */
            border: 1px solid rgba(255, 255, 255, 0.3); /* 半透明边框 */
            transition: transform 0.2s ease;        /* 鼠标悬停微动效 */
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.12);
        }

        /* 标题样式 */
        h1 {
            font-size: 2.8rem;
            font-weight: 700;            /* 粗体 */
            color: #1e1b4b;              /* 深紫色 */
            margin-bottom: 16px;
            letter-spacing: -0.02em;     /* 字距微调 */
        }

        /* 段落样式 */
        p {
            font-size: 1.2rem;
            line-height: 1.8;            /* 行高，增强可读性 */
            color: #4b5563;              /* 灰色 */
            margin-top: 8px;
        }

        /* 可以在段落里加一个装饰性小符号（可选） */
        .emoji-big {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }

        /* 响应式：手机屏幕下调整内边距和字号 */
        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 可以加一个小表情，增加活力 -->
        <span class="emoji-big">👋</span>
        <h1>欢迎来到我的主页</h1>
        <p>这是我的 GitHub Pages 网站，很高兴见到你！</p>
        <!-- 你可以继续在这里添加更多内容，比如按钮或图片 -->
    </div>
</body>
</html>
